        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes atmosphericPulse {
            0% { filter: drop-shadow(0px 4px 15px rgba(0,0,0,0.7)) drop-shadow(0px 0px 10px rgba(255,255,255,0.02)); }
            50% { filter: drop-shadow(0px 10px 30px rgba(0,0,0,0.9)) drop-shadow(0px 0px 25px rgba(255,255,255,0.08)); }
            100% { filter: drop-shadow(0px 4px 15px rgba(0,0,0,0.7)) drop-shadow(0px 0px 10px rgba(255,255,255,0.02)); }

        body {

            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0;
            text-align: center;
        }

            left: 0;
            width: 100%;
            height: 4px;
            background: transparent;
            z-index: 9999;
        }

        #scroll-bar {

            box-shadow: 0px 0px 10px rgba(29, 185, 84, 0.8);
        }

        }

            height: auto;

        }

            padding: 40px 30px;
            background: rgba(26, 26, 26, 0.75);
            backdrop-filter: blur(15px);

            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            animation: fadeIn 1.2s ease-out;
        }

        h2 {

            font-size: 1.9rem;
            letter-spacing: 0.5px;
            margin-top: 0;
        }

        .section {
            margin-bottom: 40px;
        }
